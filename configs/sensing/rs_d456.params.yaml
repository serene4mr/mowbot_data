# Intel RealSense — parameters from realsense2_camera `rs_launch.py` configurable_parameters (lines 23–101).
# Comments mirror each parameter’s `description` field there (empty upstream descriptions noted).
# Load via: config_file:=<path>
#
# Not listed here (launch-only / meta): config_file

# camera unique name
camera_name: rgbd_camera
# namespace for camera
camera_namespace: rgbd_camera
# choose device by serial number
serial_no: ''
# choose device by usb port id
usb_port_id: ''
# choose device by type
device_type: ''
# allows advanced configuration
json_file_path: ''
# (rs_launch description empty)
initial_reset: false
# enable GPU acceleration with GLSL
accelerate_gpu_with_glsl: false
# A realsense bagfile to run from as a device
rosbag_filename: ''
# Enable loop playback when playing a bagfile
rosbag_loop: false
# debug log level [DEBUG|INFO|WARN|ERROR|FATAL]
log_level: info
# pipe node output [screen|log]
output: screen
# enable color stream
enable_color: true
# color stream profile
rgb_camera.color_profile: '1280x720x30'
# color stream format
rgb_camera.color_format: RGB8
# enable/disable auto exposure for color image
rgb_camera.enable_auto_exposure: true
# Anti-flicker for AC lighting. ROS allows only 0–2 (device may report 3 → WARN without this).
# Typical: 0=disabled, 1=50 Hz, 2=60 Hz (pick for your mains frequency).
rgb_camera.power_line_frequency: 2
# enable depth stream
enable_depth: true
# enable infra0 stream
enable_infra: false
# enable infra1 stream
enable_infra1: false
# enable infra2 stream
enable_infra2: false
# depth stream profile
depth_module.depth_profile: '848x480x30'
# depth stream format
depth_module.depth_format: Z16
# infra streams (0/1/2) profile
depth_module.infra_profile: '0,0,0'
# infra0 stream format
depth_module.infra_format: RGB8
# infra1 stream format
depth_module.infra1_format: Y8
# infra2 stream format
depth_module.infra2_format: Y8
# Depth module color stream profile for d405
depth_module.color_profile: '0,0,0'
# color stream format for d405
depth_module.color_format: RGB8
# Depth module manual exposure value
depth_module.exposure: 8500
# Depth module manual gain value
depth_module.gain: 16
# Depth module hdr enablement flag. Used for hdr_merge filter
depth_module.hdr_enabled: false
# enable/disable auto exposure for depth image
depth_module.enable_auto_exposure: true
# Depth module first exposure value. Used for hdr_merge filter
depth_module.exposure.1: 7500
# Depth module first gain value. Used for hdr_merge filter
depth_module.gain.1: 16
# Depth module second exposure value. Used for hdr_merge filter
depth_module.exposure.2: 1
# Depth module second gain value. Used for hdr_merge filter
depth_module.gain.2: 16
# enable sync mode
enable_sync: false
# [0-Default, 1-Master, 2-Slave]
depth_module.inter_cam_sync_mode: 0
# enable rgbd topic
enable_rgbd: false
# enable gyro stream
enable_gyro: false
# enable accel stream
enable_accel: false
# enable motion stream (IMU) for DDS devices
enable_motion: false
# (rs_launch description empty)
gyro_fps: 0
# (rs_launch description empty)
accel_fps: 0
# motion stream samples per second
motion_fps: 0
# [0-None, 1-copy, 2-linear_interpolation]
unite_imu_method: 0
# (rs_launch description empty)
clip_distance: -2.0
# (rs_launch description empty)
angular_velocity_cov: 0.01
# (rs_launch description empty)
linear_accel_cov: 0.01
# Rate of publishing diagnostics. 0=Disabled
diagnostics_period: 0.0
# [bool] enable/disable publishing static & dynamic TF
publish_tf: true
# [double] rate in Hz for publishing dynamic TF
tf_publish_rate: 0.0
# (rs_launch description empty)
pointcloud.enable: false
# texture stream for pointcloud
pointcloud.stream_filter: 2
# texture stream index for pointcloud
pointcloud.stream_index_filter: 0
# (rs_launch description empty)
pointcloud.ordered_pc: false
# (rs_launch description empty)
pointcloud.allow_no_texture_points: false
# enable align depth filter
align_depth.enable: true
# enable colorizer filter
colorizer.enable: false
# enable_decimation_filter
decimation_filter.enable: true
# enable rotation_filter
rotation_filter.enable: false
# rotation value: 0.0, 90.0, -90.0, 180.0
rotation_filter.rotation: 0.0
# enable_spatial_filter
spatial_filter.enable: true
# enable_temporal_filter
temporal_filter.enable: true
# enable_disparity_filter — if true, pipeline can emit DISPARITY32; this node does not support that format (drops frames / ERROR).
disparity_filter.enable: false
# enable_hole_filling_filter
hole_filling_filter.enable: true
# hdr_merge filter enablement flag
hdr_merge.enable: false
# Timeout for waiting for device to connect (Seconds)
wait_for_device_timeout: -1.0
# Timeout(seconds) between consequtive reconnection attempts
reconnect_timeout: 6.0
# Root frame of the sensors transform tree
base_frame_id: link
# prefix to be prepended to all frame IDs
tf_prefix: ''
# decimation filter magnitude
decimation_filter.filter_magnitude: 2
# enable safety stream
enable_safety: false
# [int] 0-Run, 1-Standby, 2-Service
safety_camera.safety_mode: 0
# enable labeled point cloud stream
enable_labeled_point_cloud: false
# Label PointCloud stream profile
depth_mapping_camera.labeled_point_cloud_profile: '0,0,0'
# enable occupancy stream
enable_occupancy: false
# Occupancy stream profile
depth_mapping_camera.occupancy_profile: '0,0,0'
