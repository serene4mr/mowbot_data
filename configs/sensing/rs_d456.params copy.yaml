# Intel RealSense D456 — ROS 2 realsense2_camera parameters aligned with librealsense defaults.
#
# If you load this through realsense2_camera `rs_launch.py`, that launch file only *declares* a
# subset of arguments and may print warnings for extra keys here; the node still receives them
# if the driver recognizes the name. Alternatively pass this file only as node parameters from
# your own launch / `ros2 run ... --params-file`.
#
# Source on device Serial 341222300907, FW 5.17.0.10, USB 3.2 (rs-enumerate-devices 2026-04-18):
#   - Stream capabilities & intrinsics: rs-enumerate-devices -c
#   - Default stream selection (lines marked +): rs-enumerate-devices -d
#     → Depth 848x480 Z16 @ 30 Hz, Color 1280x720 RGB8 @ 30 Hz, Accel 400 Hz, Gyro 400 Hz
#   - Sensor option defaults (min/max/default table): rs-enumerate-devices -o
#
# Pass this file to rs_launch.py / realsense2_camera via config_file:=<path>
# Flat keys match examples/launch_params_from_file (see realsense2_camera README).

# --- Connection / lifecycle (factory node; empty = any device) ---
serial_no: ''
usb_port_id: ''
device_type: ''
wait_for_device_timeout: -1.0
reconnect_timeout: 6.0
initial_reset: false
rosbag_filename: ''
rosbag_loop: false
accelerate_gpu_with_glsl: false

# --- Camera identity / TF / diagnostics ---
# camera_name / camera_namespace: driver params; topic prefix /<camera_namespace>/<camera_name>/ is set
# by realsense2_camera rs_launch.py LaunchArguments. sensing.launch.py forwards realsense_*_camera_* args to
# match these — change both here and sensing.launch defaults if you rename the node.
#
# Base TF frame id is tf_prefix + (camera_name + "_" + base_frame_id) — see realsense2_camera parameters.cpp.
# For an exact root frame "rgbd_camera_link", use camera_name + base_frame_id pieces (e.g. rgbd + camera_link).
camera_name: rgbd_camera
camera_namespace: rgbd_camera
base_frame_id: link
tf_prefix: ''
publish_tf: true
tf_publish_rate: 0.0
diagnostics_period: 0.0

# --- Topics / pipelines ---
enable_sync: true
enable_rgbd: false
json_file_path: ''
clip_distance: -1.0
linear_accel_cov: 0.01
angular_velocity_cov: 0.01
hold_back_imu_for_frames: false
unite_imu_method: 0   # 0 NONE, 1 COPY, 2 LINEAR_INTERPOLATION

# --- Streams: enable flags (wrapper: enable_infra off; infra1/2 on; motion on) ---
enable_depth: true
enable_color: true
enable_infra: false       # infrared index 0 (composite / “Infrared”)
enable_infra1: false
enable_infra2: false
enable_gyro: false
enable_accel: false
enable_motion: false      # DDS-only in upstream launch metadata
enable_safety: false
enable_labeled_point_cloud: false
enable_occupancy: false

# --- Defaults from rs-enumerate-devices -d (hardware default streams) ---
depth_module.depth_profile: '848x480x30'
rgb_camera.color_profile: '1280x720x30'
# Shared RS2_STREAM_INFRARED profile (same WxHxFPS for infra / infra1 / infra2 in the wrapper)
depth_module.infra_profile: '848x480x30'

depth_module.depth_format: Z16
depth_module.infra_format: RGB8    # infra (index 0), when enabled
depth_module.infra1_format: Y8
depth_module.infra2_format: Y8
rgb_camera.color_format: RGB8

accel_fps: 400
gyro_fps: 400

# QoS strings (see realsense2_camera ros_utils.hpp list_available_qos_strings)
depth_qos: SYSTEM_DEFAULT
depth_info_qos: DEFAULT
color_qos: SYSTEM_DEFAULT
color_info_qos: DEFAULT
infra_qos: SYSTEM_DEFAULT
infra_info_qos: DEFAULT
infra1_qos: SYSTEM_DEFAULT
infra1_info_qos: DEFAULT
infra2_qos: SYSTEM_DEFAULT
infra2_info_qos: DEFAULT
accel_qos: SENSOR_DATA
accel_info_qos: DEFAULT
gyro_qos: SENSOR_DATA
gyro_info_qos: DEFAULT

# --- Stereo module options (defaults from rs-enumerate-devices -o “default” column) ---
depth_module.exposure: 33000
depth_module.gain: 16
depth_module.enable_auto_exposure: true
depth_module.visual_preset: 0
depth_module.laser_power: 150
depth_module.emitter_enabled: 1
depth_module.frames_queue_size: 16
depth_module.error_polling_enabled: false
depth_module.output_trigger_enabled: false
depth_module.depth_units: 0.001
depth_module.inter_cam_sync_mode: 0
depth_module.emitter_on_off: false
depth_module.global_time_enabled: true
depth_module.emitter_always_on: false
depth_module.thermal_compensation: false
depth_module.hdr_enabled: false
depth_module.sequence_name: 1
depth_module.sequence_size: 2
depth_module.sequence_id: 0
depth_module.auto_exposure_limit: 33000
depth_module.auto_gain_limit: 16
depth_module.auto_exposure_limit_toggle: false
depth_module.auto_gain_limit_toggle: false
depth_module.emitter_frequency: 0
depth_module.auto_exposure_mode: 0

# HDR merge helper defaults (launch metadata; HDR off above)
depth_module.exposure.1: 7500
depth_module.gain.1: 16
depth_module.exposure.2: 1
depth_module.gain.2: 16

# ROI full frame @ 848x480 (matches default depth profile)
depth_module.auto_exposure_roi.left: 0
depth_module.auto_exposure_roi.right: 847
depth_module.auto_exposure_roi.top: 0
depth_module.auto_exposure_roi.bottom: 479

# --- RGB module options (rs-enumerate-devices -o defaults) ---
rgb_camera.backlight_compensation: false
rgb_camera.brightness: 0
rgb_camera.contrast: 50
rgb_camera.exposure: 166
rgb_camera.gain: 64
rgb_camera.gamma: 300
rgb_camera.hue: 0
rgb_camera.saturation: 64
rgb_camera.sharpness: 50
rgb_camera.white_balance: 4600
rgb_camera.enable_auto_exposure: true
rgb_camera.enable_auto_white_balance: true
rgb_camera.frames_queue_size: 16
rgb_camera.power_line_frequency: 3
rgb_camera.auto_exposure_priority: false
rgb_camera.global_time_enabled: true

# --- Motion module options (rs-enumerate-devices -o defaults) ---
motion_module.frames_queue_size: 16
motion_module.enable_motion_correction: true
motion_module.global_time_enabled: true
motion_module.gyro_sensitivity: 1

# --- Depth pipeline post-processing (RealSense filter chain; not RGB photo tuning — that is rgb_camera.*) ---
# Depth cleanup: spatial (edge-aware smooth), temporal (multi-frame stability), hole_filling (invalid pixels).
# Temporal adds latency; disable if you need minimum motion-to-depth delay.
align_depth.enable: true
colorizer.enable: false
decimation_filter.enable: false
decimation_filter.filter_magnitude: 2
rotation_filter.enable: false
rotation_filter.rotation: 0.0
spatial_filter.enable: true
temporal_filter.enable: true
disparity_filter.enable: true
hole_filling_filter.enable: true
hdr_merge.enable: true
pointcloud.enable: true
pointcloud.stream_filter: 2
pointcloud.stream_index_filter: 0
pointcloud.ordered_pc: false
pointcloud.allow_no_texture_points: false
pointcloud.pointcloud_qos: DEFAULT

# --- Safety / mapping placeholders (device-specific; off by default) ---
safety_camera.safety_mode: 0
depth_mapping_camera.labeled_point_cloud_profile: '0,0,0'
depth_mapping_camera.occupancy_profile: '0,0,0'
